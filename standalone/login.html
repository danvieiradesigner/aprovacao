<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Controle de Alçada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-primary: #C6F366;
            --bg-dark: #070A08;
            --bg-dark-alt: #0B0F0C;
            --surface: #0F1511;
            --surface-alt: #121A14;
            --text-primary: #E6EAE6;
            --text-muted: #9AA39C;
            --border-neon: rgba(198, 243, 102, 0.18);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .glass {
            background: rgba(15, 21, 17, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-neon);
        }

        .neon-glow {
            box-shadow: 0 0 20px rgba(198, 243, 102, 0.3);
        }

        .neon-glow-sm {
            box-shadow: 0 0 10px rgba(198, 243, 102, 0.2);
        }

        .btn-neon {
            transition: all 0.3s ease;
        }

        .btn-neon:hover {
            box-shadow: 0 0 20px rgba(198, 243, 102, 0.4);
            transform: translateY(-2px);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 24px;
        }

        .login-card h1 {
            font-size: 2rem;
            font-weight: bold;
            color: var(--neon-primary);
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .login-card p {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 16px;
            background: var(--surface);
            border: 1px solid var(--border-neon);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--neon-primary);
            box-shadow: 0 0 10px rgba(198, 243, 102, 0.2);
        }

        .btn-primary {
            width: 100%;
            padding: 0.75rem;
            border-radius: 16px;
            background: var(--neon-primary);
            color: var(--bg-dark);
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(198, 243, 102, 0.4);
        }

        .info-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background: var(--surface-alt);
            border-radius: 12px;
            border: 1px solid var(--border-neon);
        }

        .info-box p {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin: 0;
        }

        .info-box .highlight {
            color: var(--neon-primary);
        }

        .error-message {
            margin-top: 1rem;
            padding: 0.75rem;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            border-radius: 12px;
            color: #f87171;
            font-size: 0.875rem;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="glass login-card">
        <h1>Alçada</h1>
        <p>Controle de Aprovação</p>
        <form id="login-form">
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" id="username" value="admin" required autofocus>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" value="admin" required>
            </div>
            <div class="error-message" id="error-message"></div>
            <button type="submit" class="btn-primary btn-neon">Entrar</button>
        </form>
        <div class="info-box">
            <p>
                Credenciais padrão: <span class="highlight">admin</span> / <span class="highlight">admin</span>
            </p>
        </div>
    </div>

    <script>
        // Verifica se já está logado
        function checkAuth() {
            const user = localStorage.getItem('user');
            if (user) {
                // Redireciona para o app principal
                window.location.href = 'preview.html';
            }
        }

        // Função de login
        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');
            const submitButton = document.querySelector('.btn-primary');
            
            // Limpa erro anterior
            errorMessage.classList.remove('show');
            errorMessage.textContent = '';
            
            // Validação básica
            if (!username || !password) {
                errorMessage.textContent = 'Por favor, preencha todos os campos';
                errorMessage.classList.add('show');
                return false;
            }
            
            // Validação de credenciais
            if (username === 'admin' && password === 'admin') {
                // Desabilita botão durante o processo
                if (submitButton) {
                    submitButton.disabled = true;
                    submitButton.textContent = 'Entrando...';
                }
                
                // Salva usuário no localStorage APENAS após autenticação bem-sucedida
                localStorage.setItem('user', JSON.stringify({ 
                    username: 'admin', 
                    role: 'ADMIN' 
                }));
                
                // Força redirecionamento imediato
                window.location.replace('preview.html?from=login');
                
                return true;
            } else {
                // Mostra erro e NÃO redireciona
                errorMessage.textContent = 'Credenciais inválidas. Por favor, tente novamente.';
                errorMessage.classList.add('show');
                // Limpa o campo de senha
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
                return false;
            }
        }

        // Event listeners - aguarda DOM carregar
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initLogin);
        } else {
            initLogin();
        }

        function initLogin() {
            const loginForm = document.getElementById('login-form');
            const passwordField = document.getElementById('password');
            
            if (loginForm) {
                loginForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    login();
                    return false;
                });
            }
            
            // Permite login com Enter
            if (passwordField) {
                passwordField.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        login();
                    }
                });
            }
            
            // Verifica autenticação ao carregar
            checkAuth();
        }
    </script>
</body>
</html>
