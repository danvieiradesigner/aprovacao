version: '3.8'

services:
  aprovacao-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Variáveis passadas no momento do build
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: aprovacao-frontend
    restart: unless-stopped
    ports:
      - "${APROVACAO_PORT:-3000}:80"  # Porta configurável via .env (padrão: 3000)
    networks:
      - aprovacao-network
    labels:
      # Labels para nginx-proxy-manager (opcional)
      - "com.nginx-proxy-manager.enable=true"

networks:
  aprovacao-network:
    driver: bridge

