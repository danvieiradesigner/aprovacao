server {
    listen 80;
    server_name seu-dominio.com www.seu-dominio.com;  # Altere para seu domínio
    
    # Diretório raiz com os arquivos do build
    root /var/www/aprovacao/frontend/dist;
    index index.html;

    # Logs
    access_log /var/log/nginx/aprovacao-access.log;
    error_log /var/log/nginx/aprovacao-error.log;

    # Compressão Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Cache para assets estáticos
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA - Todas as rotas devem retornar index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Segurança - Ocultar versão do Nginx
    server_tokens off;

    # Headers de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Limite de tamanho de upload (se necessário)
    client_max_body_size 10M;
}

